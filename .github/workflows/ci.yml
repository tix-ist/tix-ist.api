name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Lint, build & test
    runs-on: ubuntu-latest
    env:
      HUSKY: 0
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - run: corepack enable

      # postinstall runs `prisma generate` (no DB needed)
      - run: yarn install --frozen-lockfile

      - run: yarn lint:check

      # type-checks the whole project incl. *.spec.ts (nest build excludes specs,
      # and ts-jest runs transpile-only — so this is the only spec type-check)
      - run: yarn typecheck

      - run: yarn build

      - run: yarn test

  commitlint:
    name: Commit lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: wagoid/commitlint-github-action@v6
